aoi:
  name: "varna_bay"
  # Примерен AOI (bbox около Варненския залив)
  bbox: [27.85, 43.20, 27.95, 43.25] # [minLon, minLat, maxLon, maxLat]

time:
  since: ""   # leave empty → pipeline uses a rolling 90-day window
  to: ""      # leave empty → pipeline uses today as end date

filters:
  cloud_max: 40 # % максимална облачност

output:
  dir: "out"
  manifest_csv: "manifest.csv"
  tiles_geojson: "tiles.geojson"
