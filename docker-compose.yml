services:
  db:
    image: postgis/postgis:15-3.3
    container_name: db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1401
      - POSTGRES_DB=blacksea_monitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: etl
    volumes:
      - ./etl:/app
      - ./backend:/app/backend
      - ./ml:/app/ml
    env_file:
      - ./etl/.env
    environment:
      - DATABASE_URL=postgresql://postgres:1401@db:5432/blacksea_monitor
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
    command: python3 -u flows/pipeline.py

  backend:
    build:
      context: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ml:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://postgres:1401@db:5432/blacksea_monitor
      - ML_BASE_URL=http://ml:8500
    volumes:
      - ./backend:/app
      - ./ml:/app/ml

  ml:
    build:
      context: ./ml
    container_name: ml
    ports:
      - "8500:8500"
    volumes:
      - ./ml:/app

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

volumes:
  postgres_data:
